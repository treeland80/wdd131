<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Côte d’Ivoire</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Côte d’Ivoire</h1>
    </header>

    <main>

        <!-- HERO IMAGE -->
        <picture>
            <source media="(min-width: 768px)" srcset="images/hero-large.webp">
            <img src="images/hero-small.webp" alt="Beautiful view of Côte d’Ivoire">
        </picture>

        <!-- DATA SECTION -->
        <section class="card">
            <h2>Data</h2>

            <p><strong>Capital:</strong> Yamoussoukro</p>
            <p><strong>Population:</strong> 29 Million</p>
            <p><strong>Language:</strong> French</p>
            <p><strong>Currency:</strong> CFA Franc</p>
            <p><strong>Famous Food:</strong> Garba</p>
        </section>

        <!-- WEATHER SECTION -->
        <section class="card weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temp">8</span> °C</p>
            <p><strong>Wind Speed:</strong> <span id="speed">10</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </section>

    </main>

    <footer>
        <p>
            © <span id="currentyear"></span> | Côte d’Ivoire
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
