<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Assi Yannick Adji">

    <meta name="description" content="Temple Album responsive web page wdd131_project">


    <title>Temple Album</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-container">

            <h1>Temple Album</h1>

            <button id="menu-btn">☰</button>

            <nav id="nav-menu">
                <a href="#">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>

        </div>
    </header>

    <main>

        <h2>Beautiful Temples Around The World</h2>

        <section class="gallery">

            <figure>
                <img src="images/temple1.jpg" alt="Temple 1">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple2.jpg" alt="Temple 2">
                <figcaption>Paris Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple3.jpg" alt="Temple 3">
                <figcaption>Rome Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple4.jpg" alt="Temple 4">
                <figcaption>Tokyo Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple5.jpg" alt="Temple 5">
                <figcaption>Mexico Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple6.jpg" alt="Temple 6">
                <figcaption>Accra Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple7.jpg" alt="Temple 7">
                <figcaption>Nairobi Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple8.jpg" alt="Temple 8">
                <figcaption>Johannesburg Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple9.jpg" alt="Temple 9">
                <figcaption>Abidjan Temple</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> | Temple Album | Côte d’Ivoire
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
