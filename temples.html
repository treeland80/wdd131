<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Assi Yannick Adji">

    <meta name="description" content="Temple Album responsive web page wdd131_project">


    <title>Temple Album</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-container">

            <h1>Temple Album</h1>

            <button id="menu-btn">☰</button>

            <nav id="nav-menu">
                <a href="#">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>

        </div>
    </header>

    <main>

        <h2>Beautiful Temples Around The World</h2>

        <section class="gallery">

            <figure>
                <img src="images/salt-lake-temple-summer-glow.webp" alt="salt-lake-temple-summer-glow">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/paris_france_temple.webp" alt="paris_france_temple">
                <figcaption>Paris Temple</figcaption>
            </figure>

            <figure>
                <img src="images/rome_temple.webp" alt="Rome_temple">
                <figcaption>Rome Temple</figcaption>
            </figure>

            <figure>
                <img src="images/tokyo-temple.jpg" alt="tokyo-temple">
                <figcaption>Tokyo Temple</figcaption>
            </figure>

            <figure>
                <img src="images/tijuana-mexico-temple.jpg" alt="tijuana-mexico-temple">
                <figcaption>Mexico Temple</figcaption>
            </figure>

            <figure>
                <img src="images/accra_temple.jpg" alt="Accra_temple">
                <figcaption>Accra Temple</figcaption>
            </figure>

            <figure>
                <img src="images/kenya_naerobi_temple.png" alt="Kenya_naerobi_temple">
                <figcaption>Nairobi Temple</figcaption>
            </figure>

            <figure>
                <img src="images/johannesburg_templee.avif" alt="Johannesburg_Temple">
                <figcaption>Johannesburg Temple</figcaption>
            </figure>

            <figure>
                <img src="images/abidjan-ivory-coast-temple.jpg" alt="abidjan-ivory-coast-temple">
                <figcaption>Abidjan Temple</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> | Temple Album | Côte d’Ivoire
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
